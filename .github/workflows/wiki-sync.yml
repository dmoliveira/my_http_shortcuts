name: Wiki Sync

on:
  push:
    branches: [main]
    paths:
      - "docs/**"
      - "scripts/build-wiki.mjs"
      - ".github/workflows/wiki-sync.yml"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  sync-wiki:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Check wiki repository availability
        id: wiki-check
        run: |
          if git ls-remote "https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}.wiki.git" > /dev/null 2>&1; then
            echo "available=true" >> "$GITHUB_OUTPUT"
          else
            echo "available=false" >> "$GITHUB_OUTPUT"
            echo "::warning::Wiki git repository is not initialized yet. Create your first wiki page in GitHub UI, then rerun this workflow."
          fi

      - name: Clone wiki repository
        if: steps.wiki-check.outputs.available == 'true'
        run: |
          mkdir wiki
          git -C wiki init
          git -C wiki config user.name "github-actions[bot]"
          git -C wiki config user.email "github-actions[bot]@users.noreply.github.com"
          git -C wiki remote add origin "https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}.wiki.git"
          git -C wiki fetch origin || true
          git -C wiki checkout -B master
          git -C wiki pull --rebase origin master || true

      - name: Build wiki pages from docs
        if: steps.wiki-check.outputs.available == 'true'
        run: |
          node scripts/build-wiki.mjs wiki

      - name: Commit and push wiki updates
        if: steps.wiki-check.outputs.available == 'true'
        run: |
          cd wiki
          git add .
          git diff --staged --quiet || git commit -m "docs: sync wiki from markdown"
          git push origin master
