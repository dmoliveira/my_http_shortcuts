<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="420" viewBox="0 0 1600 420" role="img" aria-label="My HTTP Shortcuts banner">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0f172a" />
      <stop offset="50%" stop-color="#0b3b5a" />
      <stop offset="100%" stop-color="#0a7ea4" />
    </linearGradient>
    <linearGradient id="card" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.24" />
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0.08" />
    </linearGradient>
  </defs>

  <rect width="1600" height="420" fill="url(#bg)" />
  <circle cx="1340" cy="90" r="160" fill="#ffffff" fill-opacity="0.08" />
  <circle cx="220" cy="380" r="200" fill="#22d3ee" fill-opacity="0.12" />

  <rect x="70" y="70" width="1460" height="280" rx="24" fill="url(#card)" stroke="#ffffff" stroke-opacity="0.26" />

  <text x="120" y="170" fill="#e6f6ff" font-family="Helvetica, Arial, sans-serif" font-size="64" font-weight="700">
    ⚡ My HTTP Shortcuts
  </text>
  <text x="120" y="225" fill="#d6f0ff" font-family="Helvetica, Arial, sans-serif" font-size="30" font-weight="500">
    Fast, configurable browser HTTP actions with safe hooks and debug-ready history.
  </text>

  <g transform="translate(120 260)">
    <rect width="160" height="52" rx="10" fill="#14b8a6" fill-opacity="0.9" />
    <text x="80" y="34" text-anchor="middle" fill="#06211e" font-family="Helvetica, Arial, sans-serif" font-size="24" font-weight="700">MV3</text>
  </g>
  <g transform="translate(300 260)">
    <rect width="200" height="52" rx="10" fill="#38bdf8" fill-opacity="0.9" />
    <text x="100" y="34" text-anchor="middle" fill="#082132" font-family="Helvetica, Arial, sans-serif" font-size="24" font-weight="700">TypeScript</text>
  </g>
  <g transform="translate(520 260)">
    <rect width="210" height="52" rx="10" fill="#fbbf24" fill-opacity="0.9" />
    <text x="105" y="34" text-anchor="middle" fill="#3a2900" font-family="Helvetica, Arial, sans-serif" font-size="24" font-weight="700">Tested &amp; Safe</text>
  </g>
</svg>
