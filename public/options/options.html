<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>My HTTP Shortcuts Settings</title>
    <style>
      :root {
        color-scheme: light;
        --page-bg: #edf4f6;
        --page-bg-2: #f7fbfc;
        --card-bg: #ffffff;
        --card-border: #c9dce3;
        --text-main: #12232d;
        --text-muted: #4a6875;
        --accent: #0b5d77;
        --accent-soft: #e1f0f5;
        --danger: #8f2e2e;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        font-family: "Avenir Next", "Trebuchet MS", "Segoe UI", sans-serif;
        color: var(--text-main);
        background: radial-gradient(circle at top right, var(--page-bg-2) 0%, var(--page-bg) 52%, #dde8ed 100%);
      }

      .wrap {
        max-width: 980px;
        margin: 0 auto;
        padding: 24px;
        display: grid;
        gap: 14px;
      }

      .page-head {
        background: var(--card-bg);
        border: 1px solid var(--card-border);
        border-radius: 16px;
        padding: 18px;
      }

      h1,
      h2 {
        margin: 0;
      }

      h1 {
        font-size: 34px;
        line-height: 1.1;
      }

      h2 {
        font-size: 22px;
      }

      p {
        margin: 0;
      }

      .eyebrow {
        color: var(--text-muted);
        font-size: 13px;
        margin-bottom: 6px;
      }

      #status {
        margin-top: 10px;
        min-height: 18px;
        color: var(--text-muted);
      }

      .card {
        background: var(--card-bg);
        border: 1px solid var(--card-border);
        border-radius: 16px;
        padding: 16px;
        box-shadow: 0 8px 26px rgba(13, 45, 61, 0.08);
      }

      .stack {
        display: grid;
        gap: 10px;
      }

      .field-grid {
        display: grid;
        gap: 10px;
      }

      .field-grid.two {
        grid-template-columns: repeat(2, minmax(0, 1fr));
      }

      .field {
        display: grid;
        gap: 5px;
      }

      label {
        font-size: 13px;
        font-weight: 700;
        color: var(--text-muted);
      }

      textarea,
      input,
      select,
      button {
        width: 100%;
        font: inherit;
        border-radius: 10px;
      }

      textarea,
      input,
      select {
        border: 1px solid #a8c1cb;
        padding: 10px;
        background: #fff;
        color: var(--text-main);
      }

      textarea {
        resize: vertical;
      }

      button {
        height: 38px;
        border: 0;
        color: #fff;
        font-weight: 700;
        background: linear-gradient(160deg, var(--accent), #0b708f);
        cursor: pointer;
        transition: transform 120ms ease, filter 120ms ease;
      }

      button:hover {
        filter: brightness(1.06);
      }

      button:active {
        transform: translateY(1px);
      }

      .button-row {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(160px, 1fr));
        gap: 8px;
      }

      .secondary {
        background: var(--accent-soft);
        color: #0a475a;
        border: 1px solid #a4c5d1;
      }

      .danger {
        background: linear-gradient(160deg, #a64646, var(--danger));
      }

      ul {
        margin: 0;
        padding-left: 20px;
      }

      li {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 12px;
        margin-bottom: 8px;
      }

      li button {
        width: auto;
        min-width: 110px;
        margin: 0;
      }

      code {
        background: #ecf4f7;
        border-radius: 6px;
        padding: 1px 5px;
      }

      #options-history {
        max-height: 260px;
        overflow: auto;
      }

      #options-history-stats {
        color: var(--text-muted);
      }

      @media (max-width: 780px) {
        .wrap {
          padding: 16px;
        }

        .field-grid.two {
          grid-template-columns: 1fr;
        }
      }
    </style>
  </head>
  <body>
    <main class="wrap">
      <header class="page-head">
        <p class="eyebrow">My HTTP Shortcuts</p>
        <h1>🛠 Shortcut Editor</h1>
        <p>Define shortcut requests. You can use variables like <code>{{input}}</code>.</p>
        <p id="status" aria-live="polite"></p>
      </header>

      <section class="card stack">
        <h2>Shortcut Configuration</h2>
        <div class="field-grid two">
          <div class="field">
            <label for="name">Name</label>
            <input id="name" type="text" />
          </div>
          <div class="field">
            <label for="method">Method</label>
            <select id="method">
              <option>GET</option>
              <option>POST</option>
              <option>PUT</option>
              <option>PATCH</option>
              <option>DELETE</option>
            </select>
          </div>
        </div>

        <div class="field">
          <label for="url">URL</label>
          <input id="url" type="url" />
        </div>

        <div class="field-grid two">
          <div class="field">
            <label for="headers">Headers JSON</label>
            <textarea id="headers" rows="5">{}</textarea>
          </div>
          <div class="field">
            <label for="body">Body Template</label>
            <textarea id="body" rows="5"></textarea>
          </div>
        </div>

        <div class="field-grid two">
          <div class="field">
            <label for="pre-script">Pre Script</label>
            <textarea id="pre-script" rows="5"></textarea>
          </div>
          <div class="field">
            <label for="post-script">Post Script</label>
            <textarea id="post-script" rows="5"></textarea>
          </div>
        </div>

        <div class="button-row">
          <button id="save-btn" type="button">Save Shortcut</button>
        </div>
      </section>

      <section class="card stack">
        <h2>Existing Shortcuts</h2>
        <ul id="shortcuts"></ul>
      </section>

      <section class="card stack">
        <h2>🎯 Context Menu Default</h2>
        <div class="field">
          <label for="default-context-shortcut">Default shortcut for context menu</label>
          <select id="default-context-shortcut" aria-label="Default context shortcut"></select>
        </div>
        <div class="button-row">
          <button id="save-default-context-btn" type="button">Save Default</button>
        </div>
      </section>

      <section class="card stack">
        <h2>📦 Import / Export</h2>
        <div class="field">
          <label for="state-json">State JSON</label>
          <textarea id="state-json" rows="10" aria-label="State JSON textarea"></textarea>
        </div>
        <div class="button-row">
          <button id="export-btn" class="secondary" type="button">Export JSON</button>
          <button id="import-btn" type="button">Import JSON</button>
        </div>
      </section>

      <section class="card stack">
        <h2>🧭 Debug History</h2>

        <div class="field-grid two">
          <div class="field">
            <label for="history-source-filter">Source filter</label>
            <select id="history-source-filter" aria-label="History source filter">
              <option value="all">All sources</option>
              <option value="popup">Popup</option>
              <option value="context_menu">Context menu</option>
              <option value="unknown">Unknown</option>
            </select>
          </div>

          <div class="field">
            <label for="history-result-filter">Result filter</label>
            <select id="history-result-filter" aria-label="History result filter">
              <option value="all">All results</option>
              <option value="ok">Success only</option>
              <option value="error">Error only</option>
            </select>
          </div>
        </div>

        <div class="field-grid two">
          <div class="field">
            <label for="history-query-filter">Shortcut search</label>
            <input id="history-query-filter" type="text" placeholder="Search by shortcut name" />
          </div>

          <div class="field">
            <label for="history-sort-mode">Sort mode</label>
            <select id="history-sort-mode" aria-label="History sort mode">
              <option value="newest">Newest first</option>
              <option value="oldest">Oldest first</option>
              <option value="slowest">Slowest first</option>
              <option value="fastest">Fastest first</option>
            </select>
          </div>
        </div>

        <div class="field-grid two">
          <div class="field">
            <label for="history-max-items">Max items</label>
            <select id="history-max-items" aria-label="History max items">
              <option value="10">10 items</option>
              <option value="20" selected>20 items</option>
              <option value="50">50 items</option>
            </select>
          </div>

          <div class="field">
            <label for="history-min-duration">Min duration (ms)</label>
            <input id="history-min-duration" type="number" min="0" step="1" value="0" />
          </div>
        </div>

        <div class="button-row">
          <button id="history-reset-filters-btn" class="secondary" type="button">Reset Filters</button>
          <button id="clear-history-options-btn" class="danger" type="button">Clear History</button>
        </div>

        <p id="options-history-stats" aria-live="polite"></p>
        <ul id="options-history" aria-live="polite"></ul>
      </section>
    </main>
    <script type="module" src="../options/options.js"></script>
  </body>
</html>
